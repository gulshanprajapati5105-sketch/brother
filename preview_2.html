<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Craftsman Engg. — CNC Factory Monitor</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===== DARK THEME (default) ===== */
:root{
  --bg-0:#050a12;--bg-1:#0a1120;--bg-2:#111b2e;--bg-3:#182540;
  --border:#1a2744;--border-h:#2a3a5c;
  --t1:#e8edf5;--t2:#94a3b8;--t3:#546380;
  --accent:#06d6f2;--accent-d:#0891b2;
  --run:#34d399;--idle:#fbbf24;--stop:#f87171;--maint:#a78bfa;
  --header-bg:rgba(10,17,32,.88);
  --sidebar-shadow:rgba(0,0,0,.5);
  --dot-color:rgba(6,214,242,.025);
  --row-hover:rgba(6,214,242,.03);
  --td-border:rgba(26,39,68,.5);
}

/* ===== LIGHT THEME ===== */
[data-theme="light"]{
  --bg-0:#f1f5f9;--bg-1:#ffffff;--bg-2:#ffffff;--bg-3:#f8fafc;
  --border:#e2e8f0;--border-h:#cbd5e1;
  --t1:#0f172a;--t2:#475569;--t3:#94a3b8;
  --accent:#0891b2;--accent-d:#0e7490;
  --run:#059669;--idle:#d97706;--stop:#dc2626;--maint:#7c3aed;
  --header-bg:rgba(255,255,255,.88);
  --sidebar-shadow:rgba(0,0,0,.08);
  --dot-color:rgba(0,0,0,.04);
  --row-hover:rgba(8,145,178,.04);
  --td-border:rgba(226,232,240,.8);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:'Chakra Petch',sans-serif}
body{background:var(--bg-0);color:var(--t1);min-height:100vh;
  background-image:radial-gradient(circle at 1px 1px,var(--dot-color) 1px,transparent 0);background-size:48px 48px;
  transition:background .3s,color .3s}
.fm{font-family:'Inter',sans-serif}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(8,145,178,.2);border-radius:3px}

/* Sidebar */
#sidebar{width:68px;transition:width .28s cubic-bezier(.4,0,.2,1),background .3s;background:var(--bg-1);border-right:1px solid var(--border)}
#sidebar:hover{width:230px;box-shadow:6px 0 32px var(--sidebar-shadow)}
#sidebar .nl{opacity:0;transition:opacity .18s;white-space:nowrap;overflow:hidden}
#sidebar:hover .nl{opacity:1}
.nb{display:flex;align-items:center;gap:12px;width:100%;padding:10px 12px;border-radius:12px;border:none;cursor:pointer;font-size:13px;font-weight:500;transition:all .2s;background:transparent;color:var(--t3)}
.nb:hover{background:rgba(8,145,178,.06);color:var(--t2)}
.nb.active{background:rgba(8,145,178,.1);color:var(--accent)}
.nb svg{flex-shrink:0;width:20px;height:20px}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.card-e{animation:fadeUp .45s ease forwards;opacity:0}
.view-e{animation:fadeIn .3s ease}

/* Cards */
.mc{transition:all .25s ease;cursor:pointer;position:relative;overflow:hidden}
.mc::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px;border-radius:0 2px 2px 0;transition:box-shadow .3s}
.mc:hover{transform:translateY(-3px)}
[data-theme="light"] .mc:hover{box-shadow:0 8px 24px rgba(0,0,0,.08)}
[data-theme="light"] .rounded-2xl[style*="bg-2"],[data-theme="light"] .rounded-2xl{box-shadow:0 1px 3px rgba(0,0,0,.06)}

/* Tabs */
.tab-btn{padding:8px 18px;border-radius:10px;font-size:12px;font-weight:600;border:none;cursor:pointer;transition:all .2s;background:transparent;color:var(--t3)}
.tab-btn:hover{color:var(--t2)}
.tab-btn.active{background:rgba(8,145,178,.12);color:var(--accent)}

/* Table */
.tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:12px}
.tbl th{text-align:left;padding:10px 14px;color:var(--t3);font-weight:600;border-bottom:1px solid var(--border);font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.tbl td{padding:10px 14px;border-bottom:1px solid var(--td-border)}
.tbl tr:hover td{background:var(--row-hover)}

/* Input */
.sinput{background:var(--bg-3);border:1px solid var(--border);border-radius:10px;padding:8px 14px 8px 36px;color:var(--t1);font-size:12px;outline:none;transition:border .2s,background .3s;width:100%}
.sinput:focus{border-color:var(--accent)}
.sinput::placeholder{color:var(--t3)}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600}

/* Theme toggle */
.theme-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--bg-3);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;font-size:16px;line-height:1}
.theme-btn:hover{border-color:var(--accent);background:rgba(8,145,178,.08)}

/* Smooth transitions for theme-aware elements */
header,.rounded-2xl,.rounded-xl{transition:background .3s,border-color .3s,color .3s}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside id="sidebar" class="fixed left-0 top-0 bottom-0 z-50 flex flex-col overflow-hidden">
  <div class="h-16 flex items-center px-5 border-b" style="border-color:var(--border)">
    <div class="w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0" style="background:linear-gradient(135deg,var(--accent),var(--accent-d))">
      <svg class="w-4 h-4" fill="none" stroke="#fff" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <span class="nl ml-3 font-bold text-sm" style="color:var(--accent)">Craftsman Engg.</span>
  </div>
  <nav class="flex-1 py-4 px-2.5 space-y-1" id="sidebar-nav">
    <button class="nb active" data-page="dashboard" onclick="navigate('dashboard')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <span class="nl">Dashboard</span>
    </button>
    <button class="nb" data-page="alarms" onclick="navigate('alarms')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
      <span class="nl">Alarm Reports</span>
    </button>
    <button class="nb" data-page="logs" onclick="navigate('logs')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
      <span class="nl">Logs</span>
    </button>
    <button class="nb" data-page="users" onclick="navigate('users')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      <span class="nl">Users</span>
    </button>
    <button class="nb" data-page="loto" onclick="navigate('loto')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      <span class="nl">LOTO</span>
    </button>
    <button class="nb" data-page="settings" onclick="navigate('settings')">
      <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      <span class="nl">Settings</span>
    </button>
  </nav>
  <div class="p-3 border-t" style="border-color:var(--border)">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0 text-[11px] font-bold" style="background:linear-gradient(135deg,var(--accent-d),#6366f1);color:#fff">GP</div>
      <div class="nl"><p class="text-xs font-semibold">Gulshan P.</p><p class="text-[10px]" style="color:var(--t3)">Admin</p></div>
    </div>
  </div>
</aside>

<!-- MAIN -->
<div id="app" class="min-h-screen transition-all" style="margin-left:68px">
  <header class="sticky top-0 z-40 h-14 flex items-center justify-between px-6 border-b" style="background:var(--header-bg);border-color:var(--border);backdrop-filter:blur(16px)">
    <div>
      <h1 id="page-title" class="text-base font-bold tracking-wide">Dashboard</h1>
      <p class="text-[10px] fm" style="color:var(--t3)">Real-time factory monitoring</p>
    </div>
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-2 px-3 py-1.5 rounded-full" style="background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2)">
        <span class="w-2 h-2 rounded-full animate-pulse" style="background:var(--run)"></span>
        <span class="text-[11px] font-semibold" style="color:var(--run)">Live</span>
      </div>
      <span class="text-[10px] fm hidden sm:block" style="color:var(--t3)" id="clock"></span>
      <button onclick="toggleTheme()" class="theme-btn" id="theme-toggle" title="Toggle dark/light mode">
        <span id="theme-icon">&#9789;</span>
      </button>
    </div>
  </header>
  <div id="content" class="p-5 lg:p-6"></div>
</div>

<script>
// ============================================================
// DATA
// ============================================================
function hc(s){let h=0;for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))&0xffff;return h}

const RAW=[
{id:'CNC-01',type:'cnc',status:'running',temp:54,power:4.2,jobs:47,errors:1,uptime:87},
{id:'CNC-02',type:'cnc',status:'running',temp:58,power:4.5,jobs:42,errors:0,uptime:82},
{id:'CNC-03',type:'cnc',status:'running',temp:51,power:3.9,jobs:49,errors:0,uptime:91},
{id:'CNC-04',type:'cnc',status:'idle',temp:32,power:0.8,jobs:38,errors:2,uptime:65},
{id:'CNC-05',type:'cnc',status:'running',temp:56,power:4.1,jobs:44,errors:0,uptime:85},
{id:'CNC-06',type:'cnc',status:'running',temp:62,power:4.8,jobs:35,errors:1,uptime:78},
{id:'CNC-07',type:'cnc',status:'running',temp:59,power:4.3,jobs:39,errors:0,uptime:80},
{id:'CNC-08',type:'cnc',status:'stopped',temp:28,power:0,jobs:22,errors:5,uptime:45},
{id:'CNC-09',type:'cnc',status:'running',temp:55,power:4.0,jobs:41,errors:0,uptime:83},
{id:'CNC-10',type:'cnc',status:'running',temp:57,power:4.4,jobs:43,errors:0,uptime:84},
{id:'VMC-01',type:'vmc',status:'running',temp:48,power:5.2,jobs:31,errors:0,uptime:88},
{id:'VMC-02',type:'vmc',status:'running',temp:52,power:5.5,jobs:28,errors:1,uptime:85},
{id:'VMC-03',type:'vmc',status:'idle',temp:35,power:1.1,jobs:24,errors:2,uptime:68},
{id:'VMC-04',type:'vmc',status:'running',temp:50,power:5.0,jobs:30,errors:0,uptime:86},
{id:'VMC-05',type:'vmc',status:'running',temp:47,power:4.9,jobs:33,errors:0,uptime:90},
{id:'VMC-06',type:'vmc',status:'running',temp:53,power:5.3,jobs:27,errors:0,uptime:82},
{id:'VMC-07',type:'vmc',status:'maintenance',temp:30,power:0,jobs:18,errors:3,uptime:40},
{id:'VMC-08',type:'vmc',status:'running',temp:49,power:5.1,jobs:29,errors:0,uptime:84},
{id:'PRS-01',type:'press',status:'running',temp:68,power:8.2,jobs:120,errors:0,uptime:92},
{id:'PRS-02',type:'press',status:'running',temp:71,power:8.5,jobs:115,errors:1,uptime:89},
{id:'PRS-03',type:'press',status:'running',temp:65,power:7.9,jobs:118,errors:0,uptime:91},
{id:'PRS-04',type:'press',status:'stopped',temp:25,power:0,jobs:85,errors:4,uptime:52},
{id:'PRS-05',type:'press',status:'running',temp:70,power:8.3,jobs:110,errors:0,uptime:87},
{id:'PRS-06',type:'press',status:'idle',temp:38,power:1.5,jobs:95,errors:1,uptime:70}
];

const machines=RAW.map(m=>{
  const h=hc(m.id),sb={cnc:2.5,vmc:3.2,press:1.8};
  const st=+(sb[m.type]+(h%15)/10).toFixed(1);
  const ts=m.temp<60?100:m.temp<75?70:35;
  const es=Math.max(0,100-m.errors*15);
  const hs=Math.round(m.uptime*.4+es*.3+ts*.3);
  const rp=m.status==='stopped'?0:m.status==='maintenance'?5:m.uptime;
  const rem=100-rp;
  const ip=m.status==='idle'?Math.round(rem*.7):Math.round(rem*.45);
  const sp=100-rp-ip;
  const spark=Array.from({length:8},(_,i)=>m.temp+Math.round(Math.sin(h+i*1.3)*5+Math.cos(h+i)*3));
  const t24=Array.from({length:24},(_,i)=>{
    const b=m.status==='stopped'?m.temp:m.temp-8+Math.round(Math.sin(i/3)*6+(h%5));
    return Math.max(20,Math.min(95,b));
  });
  const p24=Array.from({length:24},(_,i)=>{
    if(i<6||i>20)return m.status==='stopped'?0:+(m.power*.15).toFixed(1);
    return +Math.max(0,(m.power+Math.sin(h+i)*m.power*.15)).toFixed(1);
  });
  const j24=Array.from({length:24},(_,i)=>{
    if(i<6||i>20)return 0;
    return Math.max(0,Math.round(m.jobs/14+Math.sin(h+i)*2.5));
  });
  return{...m,startupTime:st,healthScore:hs,runPct:rp,idlePct:ip,stopPct:sp,sparkline:spark,temp24:t24,power24:p24,jobs24:j24};
});

// ============================================================
// THEME PALETTES
// ============================================================
const PALETTES={
  dark:{
    run:'#34d399',idle:'#fbbf24',stop:'#f87171',maint:'#a78bfa',
    cnc:'#3b82f6',vmc:'#10b981',press:'#8b5cf6',
    accent:'#06d6f2',
    donutTrack:'#1a2744',
    tooltipBg:'#111b2e',tooltipBorder:'#1a2744',
    grid:'rgba(26,39,68,.6)',tick:'#546380',legend:'#94a3b8'
  },
  light:{
    run:'#059669',idle:'#d97706',stop:'#dc2626',maint:'#7c3aed',
    cnc:'#2563eb',vmc:'#059669',press:'#7c3aed',
    accent:'#0891b2',
    donutTrack:'#e2e8f0',
    tooltipBg:'#ffffff',tooltipBorder:'#e2e8f0',
    grid:'rgba(0,0,0,.07)',tick:'#64748b',legend:'#475569'
  }
};
let theme=localStorage.getItem('cnc-theme')||'dark';
let P=PALETTES[theme];

function toggleTheme(){
  theme=theme==='dark'?'light':'dark';
  P=PALETTES[theme];
  document.documentElement.setAttribute('data-theme',theme);
  localStorage.setItem('cnc-theme',theme);
  const ico=document.getElementById('theme-icon');
  if(ico)ico.innerHTML=theme==='dark'?'&#9788;':'&#9789;';
  render();
}
// Apply saved theme on load
(function(){
  document.documentElement.setAttribute('data-theme',theme);
  P=PALETTES[theme];
})();

// ============================================================
// STATE
// ============================================================
const S={page:'dashboard',filter:'all',selMachine:null,detailTab:'overview',logSearch:''};
const charts={};
function destroyCharts(){Object.keys(charts).forEach(k=>{charts[k].destroy();delete charts[k]})}

// ============================================================
// HELPERS
// ============================================================
const sc=s=>({running:P.run,idle:P.idle,stopped:P.stop,maintenance:P.maint}[s]||'#64748b');
const tc=t=>({cnc:P.cnc,vmc:P.vmc,press:P.press}[t]);
const tl=t=>({cnc:'CNC',vmc:'VMC',press:'Press'}[t]);
const filtered=()=>S.filter==='all'?machines:machines.filter(m=>m.type===S.filter);
const hcol=v=>v>=80?P.run:v>=55?P.idle:P.stop;

function donutSVG(rp,ip,sp,sz,r,sw){
  if(!r){r=20;sw=5;sz=sz||52}
  const cx=sz/2,cy=sz/2,c=2*Math.PI*r;
  const segs=[{p:rp,c:P.run},{p:ip,c:P.idle},{p:sp,c:P.stop}].filter(s=>s.p>0);
  let off=0;
  let paths=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke-width="${sw}" stroke="${P.donutTrack}"/>`;
  segs.forEach((s,i)=>{const l=(s.p/100)*c;paths+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke-width="${sw}" stroke="${s.c}" stroke-dasharray="${l} ${c-l}" stroke-dashoffset="${-off}" stroke-linecap="round" style="transition:stroke-dashoffset .8s ease ${i*.12}s"/>`;off+=l});
  return `<svg viewBox="0 0 ${sz} ${sz}" width="${sz}" height="${sz}" class="-rotate-90">${paths}</svg>`;
}
function miniDonut(rp,ip,sp,sz){return donutSVG(rp,ip,sp,sz||52,20,5)}

function sparkSVG(data,w=72,h=22,col='var(--accent)'){
  const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;
  const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-mn)/rng)*(h-4)-2}`).join(' ');
  return `<svg viewBox="0 0 ${w} ${h}" width="${w}" height="${h}"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity=".8"/></svg>`;
}

function genLogs(mid){
  const m=machines.find(x=>x.id===mid);if(!m)return[];
  const h=hc(mid);
  const msgs={
    info:['Machine powered on','Spindle started at {r} RPM','Job #{j} started','Job #{j} completed','Tool change: T{t}','Coolant level OK','Cycle time: {c}s','Part ejected','Program loaded: P{p}','Warmup complete','Feed rate adjusted','Axis homed successfully','Auto mode engaged','Batch counter updated'],
    warning:['Temperature rising: {d}°C','Vibration above threshold','Coolant level low','Tool wear approaching limit','Power fluctuation detected','Cycle time exceeded target','Chip conveyor full','Hydraulic oil temp high'],
    error:['Emergency stop triggered','Spindle overload detected','Axis limit reached','Communication timeout','Hydraulic pressure drop','Motor fault E{e}','Servo alarm: axis overload','Tool breakage detected']
  };
  const logs=[];
  for(let i=0;i<28;i++){
    const hr=6+Math.floor(i*14/28),mn=(h*(i+1)*7)%60;
    const tp=i<20?'info':i<24?'warning':'error';
    const pool=msgs[tp];
    let msg=pool[(h+i)%pool.length].replace('{r}',1200+(h%3)*600).replace('{j}',1000+i).replace('{t}',1+(i%8)).replace('{c}',25+(h%20)).replace('{p}',100+(h%50)).replace('{d}',m.temp+5).replace('{e}',100+(h%50));
    logs.push({time:`${String(hr).padStart(2,'0')}:${String(mn).padStart(2,'0')}`,type:tp,message:msg});
  }
  return logs.sort((a,b)=>b.time.localeCompare(a.time));
}

function genHistory(mid){
  const m=machines.find(x=>x.id===mid);if(!m)return[];
  const h=hc(mid),hist=[];
  for(let d=30;d>=1;d--){
    const dt=new Date();dt.setDate(dt.getDate()-d);
    const v=Math.sin(h+d)*.3;
    hist.push({
      date:dt.toISOString().split('T')[0],
      shift:d%2===0?'Day':'Night',
      jobs:Math.max(0,Math.round(m.jobs*(.7+v+Math.random()*.3))),
      avgPower:Math.max(0,+(m.power*(.8+v*.5+Math.random()*.2)).toFixed(1)),
      avgTemp:Math.max(20,Math.round(m.temp*(.85+v*.3+Math.random()*.15))),
      errors:Math.floor(Math.random()*Math.max(1,m.errors+1)),
      uptime:Math.min(100,Math.max(30,Math.round(m.uptime*(.85+Math.random()*.15))))
    });
  }
  return hist;
}

function downloadCSV(data,fname){
  if(!data.length)return;
  const hd=Object.keys(data[0]).join(',');
  const rows=data.map(r=>Object.values(r).join(',')).join('\n');
  const blob=new Blob([hd+'\n'+rows],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname;a.click();URL.revokeObjectURL(a.href);
}

      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Export CSV
    </button>
  </div>
  <div class="rounded-2xl border overflow-hidden" style="background:var(--bg-2);border-color:var(--border)">
    <div class="overflow-x-auto">
      <table class="tbl">
        <thead><tr><th style="width:80px">Time</th><th style="width:90px">Severity</th><th>Message</th></tr></thead>
        <tbody>${fLogs.map(l=>`<tr>
          <td class="fm text-[11px]">${l.time}</td>
          <td><span class="badge" style="background:${typeCol[l.type]}14;color:${typeCol[l.type]}">${l.type.toUpperCase()}</span></td>
          <td class="text-[11px]">${l.message}</td>

      </table>

  </div>
  <p class="text-[10px] mt-3" style="color:var(--t3)">Showing ${fLogs.length} of ${logs.length} log entries</p>`;
}

      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Export CSV
    </button>
  </div>
  <div class="rounded-2xl border overflow-hidden" style="background:var(--bg-2);border-color:var(--border)">
    <div class="overflow-x-auto">
      <table class="tbl">
        <thead><tr><th>Date</th><th>Shift</th><th>Jobs</th><th>Avg Power</th><th>Avg Temp</th><th>Errors</th><th>Uptime</th></tr></thead>
        <tbody>${hist.map(r=>`<tr>
          <td class="fm text-[11px]">${r.date}</td>
          <td><span class="badge" style="background:${r.shift==='Day'?'rgba(251,191,36,.12);color:#fbbf24':'rgba(139,92,246,.12);color:#a78bfa'}">${r.shift}</span></td>
          <td class="fm">${r.jobs}</td>
          <td class="fm">${r.avgPower} kW</td>

          <td><div class="flex items-center gap-2"><div class="flex-1 h-1.5 rounded-full" style="background:var(--bg-1)"><div class="h-full rounded-full" style="width:${r.uptime}%;background:${r.uptime>80?'var(--run)':r.uptime>60?'var(--idle)':'var(--stop)'}"></div></div><span class="fm text-[10px]" style="width:32px;text-align:right">${r.uptime}%</span></div></td>

// ============================================================
// CHARTS
// ============================================================
const cFont={family:'Inter',size:10};
const cGrid=()=>({color:P.grid});
const cTick=()=>({color:P.tick,font:cFont});
const cTooltip=()=>({backgroundColor:P.tooltipBg,borderColor:P.tooltipBorder,borderWidth:1,titleFont:cFont,bodyFont:cFont,titleColor:P.tick,bodyColor:P.legend,padding:10,cornerRadius:8});

function initDashCharts(ms){
  // Hourly production
  const hrs=Array.from({length:24},(_,i)=>String(i).padStart(2,'0')+':00');
  const prodData=hrs.map((_,i)=>{
    if(i<6||i>20)return 0;
    return ms.filter(m=>m.status==='running').reduce((s,m)=>s+(m.jobs24[i]||0),0);
  });
  const ctx1=document.getElementById('ch-prod');
  if(ctx1){
    const g=ctx1.getContext('2d');
    const grad=g.createLinearGradient(0,0,0,180);
    grad.addColorStop(0,'rgba(6,214,242,.25)');grad.addColorStop(1,'rgba(6,214,242,.01)');
    charts.prod=new Chart(g,{
      type:'line',
      data:{labels:hrs,datasets:[{data:prodData,fill:true,backgroundColor:grad,borderColor:P.accent,borderWidth:2,tension:.4,pointRadius:0,pointHoverRadius:4,pointHoverBackgroundColor:P.accent}]},
      options:{responsive:true,plugins:{legend:{display:false},tooltip:cTooltip()},scales:{x:{grid:cGrid(),ticks:{...cTick(),maxTicksLimit:12}},y:{grid:cGrid(),ticks:cTick(),beginAtZero:true}}}
    });
  }

  // Utilization by type
  const types=['CNC','VMC','Press'];
  const typeKeys=['cnc','vmc','press'];
  const utilData=typeKeys.map(tk=>{
    const tm=ms.filter(m=>m.type===tk);
    const n=tm.length||1;
    return{
      run:Math.round(tm.filter(m=>m.status==='running').length/n*100),
      idle:Math.round(tm.filter(m=>m.status==='idle').length/n*100),
      stop:Math.round(tm.filter(m=>m.status==='stopped'||m.status==='maintenance').length/n*100)
    };
  });
  const ctx2=document.getElementById('ch-util');
  if(ctx2){
    charts.util=new Chart(ctx2.getContext('2d'),{
      type:'bar',
      data:{labels:types,datasets:[
        {label:'Running',data:utilData.map(d=>d.run),backgroundColor:P.run,borderRadius:4,barPercentage:.6},
        {label:'Idle',data:utilData.map(d=>d.idle),backgroundColor:P.idle,borderRadius:4,barPercentage:.6},
        {label:'Stopped',data:utilData.map(d=>d.stop),backgroundColor:P.stop,borderRadius:4,barPercentage:.6}
      ]},
      options:{indexAxis:'y',responsive:true,plugins:{legend:{labels:{color:P.legend,font:cFont,boxWidth:10,padding:15}},tooltip:cTooltip()},scales:{x:{stacked:true,max:100,grid:cGrid(),ticks:{...cTick(),callback:v=>v+'%'}},y:{stacked:true,grid:{display:false},ticks:cTick()}}}
    });
  }
}

function initDetailCharts(m){
  const hrs=Array.from({length:24},(_,i)=>String(i).padStart(2,'0')+':00');

  // Temperature
  const ctx1=document.getElementById('ch-dtemp');
  if(ctx1){
    const g=ctx1.getContext('2d');
    const grad=g.createLinearGradient(0,0,0,180);
    grad.addColorStop(0,'rgba(251,191,36,.2)');grad.addColorStop(1,'rgba(251,191,36,.01)');
    charts.dtemp=new Chart(g,{
      type:'line',
      data:{labels:hrs,datasets:[{data:m.temp24,fill:true,backgroundColor:grad,borderColor:P.idle,borderWidth:2,tension:.4,pointRadius:0,pointHoverRadius:4,pointHoverBackgroundColor:P.idle}]},
      options:{responsive:true,plugins:{legend:{display:false},tooltip:{...cTooltip(),callbacks:{label:c=>c.raw+'°C'}}},scales:{x:{grid:cGrid(),ticks:{...cTick(),maxTicksLimit:12}},y:{grid:cGrid(),ticks:{...cTick(),callback:v=>v+'°'},suggestedMin:20,suggestedMax:90}}}
    });
  }

  // Power
  const ctx2=document.getElementById('ch-dpower');
  if(ctx2){
    const g=ctx2.getContext('2d');
    const grad=g.createLinearGradient(0,0,0,180);
    grad.addColorStop(0,'rgba(6,214,242,.22)');grad.addColorStop(1,'rgba(6,214,242,.01)');
    charts.dpower=new Chart(g,{
      type:'line',
      data:{labels:hrs,datasets:[{data:m.power24,fill:true,backgroundColor:grad,borderColor:P.accent,borderWidth:2,tension:.35,pointRadius:0,pointHoverRadius:4,pointHoverBackgroundColor:P.accent}]},
      options:{responsive:true,plugins:{legend:{display:false},tooltip:{...cTooltip(),callbacks:{label:c=>c.raw+' kW'}}},scales:{x:{grid:cGrid(),ticks:{...cTick(),maxTicksLimit:12}},y:{grid:cGrid(),ticks:{...cTick(),callback:v=>v+' kW'},beginAtZero:true}}}
    });
  }

  // Jobs
  const ctx3=document.getElementById('ch-djobs');
  if(ctx3){
    charts.djobs=new Chart(ctx3.getContext('2d'),{
      type:'bar',
      data:{labels:hrs,datasets:[{data:m.jobs24,backgroundColor:P.maint+'99',hoverBackgroundColor:P.maint+'dd',borderRadius:4,barPercentage:.7}]},
      options:{responsive:true,plugins:{legend:{display:false},tooltip:{...cTooltip(),callbacks:{label:c=>c.raw+' jobs'}}},scales:{x:{grid:{display:false},ticks:{...cTick(),maxTicksLimit:12}},y:{grid:cGrid(),ticks:cTick(),beginAtZero:true}}}
    });
  }
}

// ============================================================
// EVENTS
// ============================================================
function setFilter(f){S.filter=f;renderDashboard()}
function selectMachine(id){S.selMachine=id;S.detailTab='overview';S.logSearch='';render()}
function goBack(){S.selMachine=null;render()}
function setDetailTab(tab){S.detailTab=tab;const m=machines.find(x=>x.id===S.selMachine);if(m)renderDetailTab(m)}
function downloadMachineReport(id){
  const m=machines.find(x=>x.id===id);if(!m)return;
  const hist=genHistory(id);
  const logs=genLogs(id);
  let csv=`Machine Report: ${m.id}\nType,${tl(m.type)}\nStatus,${m.status}\nTemperature,${m.temp}°C\nPower,${m.power} kW\nJobs Today,${m.jobs}\nErrors,${m.errors}\nUptime,${m.uptime}%\nHealth Score,${m.healthScore}\n\n`;
  csv+='--- HISTORY ---\n'+Object.keys(hist[0]).join(',')+'\n'+hist.map(r=>Object.values(r).join(',')).join('\n');
  csv+='\n\n--- LOGS ---\nTime,Type,Message\n'+logs.map(l=>`${l.time},${l.type},"${l.message}"`).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`${m.id}-report.csv`;a.click();URL.revokeObjectURL(a.href);
}

// ============================================================
// MAIN RENDER
// ============================================================
function render(){
  renderSidebar();
  document.getElementById('page-title').textContent=pageTitles[S.page]||S.page;
  if(S.page==='dashboard'){
    if(S.selMachine) renderDetail();
    else renderDashboard();
  }else{
    renderPlaceholder();
  }
}

// Clock
function updateClock(){
  const d=new Date();
  const el=document.getElementById('clock');
  if(el) el.textContent=d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(updateClock,1000);updateClock();

// Set theme icon on load
(function(){
  const ico=document.getElementById('theme-icon');
  if(ico) ico.innerHTML=theme==='dark'?'&#9788;':'&#9789;';
})();

// Init
render();
</script>
