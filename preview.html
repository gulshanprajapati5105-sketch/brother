<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Craftsman Engg. — IoT Machine Monitoring Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0a0e17; overflow: hidden; }
        @keyframes pulse { 0%,100% { opacity:1 } 50% { opacity:0.4 } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/prop-types@15/prop-types.min.js" crossorigin></script>
    <script>window.PropTypes = window.PropTypes || window.propTypes;</script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
const { useState, useMemo, useCallback } = React;
const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, PieChart, Pie, Cell, AreaChart, Area, Legend } = Recharts;

// --- DATA GENERATION ---
const MACHINE_TYPES = ["CNC", "VMC", "Press"];
const STATUSES = ["Running", "Idle", "Offline", "Maintenance"];
const STATUS_COLORS = { Running: "#22c55e", Idle: "#f59e0b", Offline: "#ef4444", Maintenance: "#8b5cf6" };
const STATUS_BG = { Running: "rgba(34,197,94,0.12)", Idle: "rgba(245,158,11,0.12)", Offline: "rgba(239,68,68,0.12)", Maintenance: "rgba(139,92,246,0.12)" };

const seed = (s) => { let h = 0; for (let i = 0; i < s.length; i++) { h = Math.imul(31, h) + s.charCodeAt(i) | 0; } return () => { h = h ^ (h << 13); h = h ^ (h >> 17); h = h ^ (h << 5); return (h >>> 0) / 4294967296; }; };

const generateMachines = () => {
  const machines = [];
  MACHINE_TYPES.forEach(type => {
    const count = type === "CNC" ? 15 : type === "VMC" ? 12 : 10;
    for (let i = 1; i <= count; i++) {
      const id = `${type}-${String(i).padStart(3, "0")}`;
      const rng = seed(id + "v3");
      const status = STATUSES[Math.floor(rng() * 100) % (rng() > 0.15 ? 3 : 4)];
      const oee = status === "Running" ? 65 + rng() * 30 : status === "Idle" ? 20 + rng() * 30 : rng() * 15;
      const cycleTime = type === "CNC" ? 12 + rng() * 18 : type === "VMC" ? 8 + rng() * 12 : 3 + rng() * 7;
      const rejectRate = rng() * 8;
      const spindleSpeed = type === "Press" ? 0 : 800 + rng() * 2200;
      const temp = 35 + rng() * 45;
      const vibration = rng() * 12;
      const power = status === "Offline" ? 0 : 15 + rng() * 85;
      const runtime = status === "Running" ? 4 + rng() * 18 : 0;
      const idleTime = status === "Idle" ? 0.5 + rng() * 4 : 0;
      const productionCount = Math.floor(50 + rng() * 450);
      const lastMaintenance = Math.floor(1 + rng() * 30);
      const nextMaintenance = Math.floor(1 + rng() * 14);

      const history24h = Array.from({ length: 24 }, (_, h) => {
        const r = seed(id + h + "hist");
        return {
          hour: `${String(h).padStart(2, "0")}:00`,
          oee: Math.max(0, Math.min(100, 40 + r() * 50 + (Math.sin(h / 3) * 10))),
          power: 20 + r() * 70,
          temp: 35 + r() * 40,
          vibration: r() * 10,
          production: Math.floor(5 + r() * 25),
          cycleTime: cycleTime * (0.8 + r() * 0.4),
        };
      });

      const history7d = Array.from({ length: 7 }, (_, d) => {
        const r = seed(id + d + "7d");
        const days = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
        return {
          day: days[d],
          oee: 50 + r() * 40,
          uptime: 60 + r() * 35,
          downtime: 2 + r() * 20,
          production: Math.floor(80 + r() * 300),
          rejects: Math.floor(r() * 25),
        };
      });

      const alerts = [];
      if (temp > 70) alerts.push({ type: "warning", msg: `High temperature: ${temp.toFixed(1)}°C` });
      if (vibration > 9) alerts.push({ type: "critical", msg: `Excessive vibration: ${vibration.toFixed(1)} mm/s` });
      if (rejectRate > 5) alerts.push({ type: "warning", msg: `High reject rate: ${rejectRate.toFixed(1)}%` });
      if (status === "Maintenance") alerts.push({ type: "info", msg: "Scheduled maintenance in progress" });

      machines.push({ id, type, status, oee, cycleTime, rejectRate, spindleSpeed, temp, vibration, power, runtime, idleTime, productionCount, lastMaintenance, nextMaintenance, history24h, history7d, alerts });
    }
  });
  return machines;
};

const ALL_MACHINES = generateMachines();

// --- ICONS ---
const IconMachine = ({ type, size = 48, status }) => {
  const color = STATUS_COLORS[status] || "#666";
  const glow = status === "Running" ? `drop-shadow(0 0 6px ${color})` : "none";
  if (type === "CNC") return (
    <svg width={size} height={size} viewBox="0 0 64 64" fill="none" style={{ filter: glow }}>
      <rect x="8" y="16" width="48" height="40" rx="4" fill={color} opacity="0.15" stroke={color} strokeWidth="2"/>
      <rect x="14" y="22" width="36" height="20" rx="2" fill={color} opacity="0.25"/>
      <rect x="18" y="26" width="12" height="12" rx="1" fill={color} opacity="0.5"/>
      <circle cx="44" cy="32" r="5" fill={color} opacity="0.6"/>
      <line x1="20" y1="48" x2="20" y2="56" stroke={color} strokeWidth="2" strokeLinecap="round"/>
      <line x1="44" y1="48" x2="44" y2="56" stroke={color} strokeWidth="2" strokeLinecap="round"/>
      <rect x="22" y="10" width="20" height="6" rx="2" fill={color} opacity="0.3"/>
      <circle cx="32" cy="13" r="2" fill={color}/>
    </svg>
  );
  if (type === "VMC") return (
    <svg width={size} height={size} viewBox="0 0 64 64" fill="none" style={{ filter: glow }}>
      <rect x="10" y="12" width="44" height="44" rx="4" fill={color} opacity="0.15" stroke={color} strokeWidth="2"/>
      <rect x="16" y="18" width="32" height="24" rx="2" fill={color} opacity="0.2"/>
      <line x1="32" y1="18" x2="32" y2="42" stroke={color} strokeWidth="1.5" opacity="0.5"/>
      <line x1="16" y1="30" x2="48" y2="30" stroke={color} strokeWidth="1.5" opacity="0.5"/>
      <circle cx="32" cy="30" r="8" fill="none" stroke={color} strokeWidth="2" opacity="0.6"/>
      <circle cx="32" cy="30" r="3" fill={color} opacity="0.7"/>
      <rect x="20" y="46" width="24" height="4" rx="1" fill={color} opacity="0.3"/>
      <rect x="14" y="8" width="8" height="4" rx="1" fill={color} opacity="0.4"/>
      <rect x="42" y="8" width="8" height="4" rx="1" fill={color} opacity="0.4"/>
    </svg>
  );
  return (
    <svg width={size} height={size} viewBox="0 0 64 64" fill="none" style={{ filter: glow }}>
      <rect x="6" y="20" width="52" height="32" rx="4" fill={color} opacity="0.15" stroke={color} strokeWidth="2"/>
      <path d="M16 20 L32 6 L48 20" fill={color} opacity="0.2" stroke={color} strokeWidth="2"/>
      <rect x="12" y="26" width="40" height="8" rx="2" fill={color} opacity="0.3"/>
      <rect x="12" y="38" width="40" height="8" rx="2" fill={color} opacity="0.2"/>
      <line x1="16" y1="52" x2="16" y2="58" stroke={color} strokeWidth="3" strokeLinecap="round"/>
      <line x1="48" y1="52" x2="48" y2="58" stroke={color} strokeWidth="3" strokeLinecap="round"/>
      <circle cx="46" cy="24" r="2" fill={color}/>
    </svg>
  );
};

// --- STYLES ---
const FONTS = `'JetBrains Mono', 'SF Mono', 'Fira Code', monospace`;
const FONT_BODY = `'DM Sans', 'Segoe UI', system-ui, sans-serif`;

const S = {
  root: { fontFamily: FONT_BODY, background: "#0a0e17", color: "#e2e8f0", minHeight: "100vh", overflow: "hidden" },
  header: { display: "flex", alignItems: "center", justifyContent: "space-between", padding: "16px 24px", borderBottom: "1px solid rgba(255,255,255,0.06)", background: "rgba(10,14,23,0.95)", backdropFilter: "blur(12px)", position: "sticky", top: 0, zIndex: 100 },
  logo: { fontFamily: FONTS, fontSize: 18, fontWeight: 700, letterSpacing: "0.08em", color: "#38bdf8", display: "flex", alignItems: "center", gap: 10 },
  pill: (active) => ({ padding: "7px 18px", borderRadius: 20, border: active ? "1.5px solid #38bdf8" : "1.5px solid rgba(255,255,255,0.08)", background: active ? "rgba(56,189,248,0.12)" : "transparent", color: active ? "#38bdf8" : "#94a3b8", cursor: "pointer", fontFamily: FONTS, fontSize: 12, fontWeight: 600, letterSpacing: "0.06em", transition: "all 0.2s" }),
  card: { background: "rgba(255,255,255,0.03)", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 12, padding: 20, transition: "all 0.25s" },
  cardHover: { background: "rgba(255,255,255,0.05)", borderColor: "rgba(56,189,248,0.2)" },
  kpiVal: { fontFamily: FONTS, fontSize: 28, fontWeight: 700, letterSpacing: "-0.02em" },
  kpiLabel: { fontSize: 11, fontWeight: 600, letterSpacing: "0.1em", textTransform: "uppercase", color: "#64748b", marginBottom: 4 },
  badge: (status) => ({ display: "inline-flex", alignItems: "center", gap: 6, padding: "4px 12px", borderRadius: 20, fontSize: 11, fontWeight: 700, fontFamily: FONTS, letterSpacing: "0.05em", color: STATUS_COLORS[status], background: STATUS_BG[status] }),
  machineCard: (status, selected) => ({ ...S.card, cursor: "pointer", position: "relative", overflow: "hidden", border: selected ? `1.5px solid ${STATUS_COLORS[status]}` : "1px solid rgba(255,255,255,0.06)", boxShadow: selected ? `0 0 20px ${STATUS_COLORS[status]}22` : "none" }),
  btn: (variant) => ({ padding: "8px 20px", borderRadius: 8, border: variant === "primary" ? "none" : "1px solid rgba(255,255,255,0.12)", background: variant === "primary" ? "linear-gradient(135deg, #0ea5e9, #38bdf8)" : "rgba(255,255,255,0.04)", color: variant === "primary" ? "#000" : "#e2e8f0", fontFamily: FONTS, fontSize: 12, fontWeight: 700, cursor: "pointer", letterSpacing: "0.04em", transition: "all 0.2s" }),
  scrollY: { overflowY: "auto", scrollbarWidth: "thin", scrollbarColor: "#1e293b transparent" },
};

// --- COMPONENTS ---
const KPICard = ({ label, value, suffix, color, trend }) => (
  <div style={S.card}>
    <div style={S.kpiLabel}>{label}</div>
    <div style={{ ...S.kpiVal, color: color || "#e2e8f0" }}>
      {typeof value === "number" ? value.toFixed(1) : value}
      {suffix && <span style={{ fontSize: 14, fontWeight: 500, marginLeft: 4, color: "#64748b" }}>{suffix}</span>}
    </div>
    {trend !== undefined && (
      <div style={{ fontSize: 12, color: trend >= 0 ? "#22c55e" : "#ef4444", marginTop: 4, fontFamily: FONTS }}>
        {trend >= 0 ? "\u25B2" : "\u25BC"} {Math.abs(trend).toFixed(1)}% vs yesterday
      </div>
    )}
  </div>
);

const StatusDot = ({ status }) => (
  <span style={{ display: "inline-block", width: 8, height: 8, borderRadius: "50%", background: STATUS_COLORS[status], boxShadow: status === "Running" ? `0 0 8px ${STATUS_COLORS[status]}` : "none", animation: status === "Running" ? "pulse 2s infinite" : "none" }} />
);

const MachineGridCard = ({ machine, onClick, selected }) => {
  const [hovered, setHovered] = useState(false);
  return (
    <div
      style={{ ...S.machineCard(machine.status, selected), ...(hovered ? S.cardHover : {}) }}
      onClick={onClick}
      onMouseEnter={() => setHovered(true)}
      onMouseLeave={() => setHovered(false)}
    >
      <div style={{ position: "absolute", top: 0, left: 0, right: 0, height: 3, background: STATUS_COLORS[machine.status], opacity: 0.7 }} />
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 12 }}>
        <div>
          <div style={{ fontFamily: FONTS, fontSize: 13, fontWeight: 700, color: "#e2e8f0", letterSpacing: "0.04em" }}>{machine.id}</div>
          <div style={S.badge(machine.status)}><StatusDot status={machine.status} />{machine.status}</div>
        </div>
        <IconMachine type={machine.type} size={44} status={machine.status} />
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "8px 16px", marginTop: 8 }}>
        <div><span style={{ fontSize: 10, color: "#64748b", fontFamily: FONTS }}>OEE</span><div style={{ fontFamily: FONTS, fontSize: 16, fontWeight: 700, color: machine.oee > 70 ? "#22c55e" : machine.oee > 40 ? "#f59e0b" : "#ef4444" }}>{machine.oee.toFixed(1)}%</div></div>
        <div><span style={{ fontSize: 10, color: "#64748b", fontFamily: FONTS }}>CYCLE</span><div style={{ fontFamily: FONTS, fontSize: 16, fontWeight: 700, color: "#e2e8f0" }}>{machine.cycleTime.toFixed(1)}s</div></div>
        <div><span style={{ fontSize: 10, color: "#64748b", fontFamily: FONTS }}>TEMP</span><div style={{ fontFamily: FONTS, fontSize: 16, fontWeight: 700, color: machine.temp > 70 ? "#ef4444" : "#e2e8f0" }}>{machine.temp.toFixed(0)}\u00B0C</div></div>
        <div><span style={{ fontSize: 10, color: "#64748b", fontFamily: FONTS }}>POWER</span><div style={{ fontFamily: FONTS, fontSize: 16, fontWeight: 700, color: "#e2e8f0" }}>{machine.power.toFixed(0)}%</div></div>
      </div>
      {machine.alerts.length > 0 && (
        <div style={{ marginTop: 10, padding: "6px 10px", borderRadius: 6, background: "rgba(239,68,68,0.08)", border: "1px solid rgba(239,68,68,0.15)", fontSize: 10, color: "#fca5a5", fontFamily: FONTS }}>
          \u26A0 {machine.alerts.length} alert{machine.alerts.length > 1 ? "s" : ""}
        </div>
      )}
    </div>
  );
};

const MiniGauge = ({ value, max = 100, label, unit, color }) => {
  const pct = Math.min(100, (value / max) * 100);
  return (
    <div style={{ textAlign: "center" }}>
      <svg width="90" height="54" viewBox="0 0 90 54">
        <path d="M10 50 A35 35 0 0 1 80 50" fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth="7" strokeLinecap="round" />
        <path d="M10 50 A35 35 0 0 1 80 50" fill="none" stroke={color} strokeWidth="7" strokeLinecap="round" strokeDasharray={`${pct * 1.1} 110`} style={{ filter: `drop-shadow(0 0 4px ${color})` }} />
        <text x="45" y="42" textAnchor="middle" fill={color} fontSize="16" fontWeight="700" fontFamily={FONTS}>{typeof value === "number" ? value.toFixed(1) : value}</text>
        <text x="45" y="52" textAnchor="middle" fill="#64748b" fontSize="8" fontFamily={FONTS}>{unit}</text>
      </svg>
      <div style={{ fontSize: 10, color: "#64748b", fontFamily: FONTS, marginTop: 2 }}>{label}</div>
    </div>
  );
};

const ReportModal = ({ machine, onClose }) => {
  const m = machine;
  const totalProd7d = m.history7d.reduce((a, d) => a + d.production, 0);
  const totalRejects7d = m.history7d.reduce((a, d) => a + d.rejects, 0);
  const avgOEE7d = m.history7d.reduce((a, d) => a + d.oee, 0) / 7;
  const avgUptime7d = m.history7d.reduce((a, d) => a + d.uptime, 0) / 7;
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,0.7)", backdropFilter: "blur(8px)" }} onClick={onClose}>
      <div style={{ ...S.card, width: "90%", maxWidth: 700, maxHeight: "85vh", overflow: "auto", border: "1px solid rgba(56,189,248,0.2)", scrollbarWidth: "thin", scrollbarColor: "#1e293b transparent" }} onClick={e => e.stopPropagation()}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <div>
            <div style={{ fontFamily: FONTS, fontSize: 20, fontWeight: 700, color: "#38bdf8" }}>Performance Report</div>
            <div style={{ fontSize: 13, color: "#64748b", marginTop: 2 }}>{m.id} — Generated {new Date().toLocaleDateString()}</div>
          </div>
          <button style={S.btn()} onClick={onClose}>Close</button>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 12, marginBottom: 24 }}>
          <div style={{ ...S.card, padding: 12, textAlign: "center" }}><div style={{ fontSize: 10, color: "#64748b", fontFamily: FONTS }}>AVG OEE</div><div style={{ fontFamily: FONTS, fontSize: 22, fontWeight: 700, color: "#38bdf8" }}>{avgOEE7d.toFixed(1)}%</div></div>
          <div style={{ ...S.card, padding: 12, textAlign: "center" }}><div style={{ fontSize: 10, color: "#64748b", fontFamily: FONTS }}>PRODUCTION</div><div style={{ fontFamily: FONTS, fontSize: 22, fontWeight: 700, color: "#22c55e" }}>{totalProd7d}</div></div>
          <div style={{ ...S.card, padding: 12, textAlign: "center" }}><div style={{ fontSize: 10, color: "#64748b", fontFamily: FONTS }}>REJECTS</div><div style={{ fontFamily: FONTS, fontSize: 22, fontWeight: 700, color: "#ef4444" }}>{totalRejects7d}</div></div>
          <div style={{ ...S.card, padding: 12, textAlign: "center" }}><div style={{ fontSize: 10, color: "#64748b", fontFamily: FONTS }}>UPTIME</div><div style={{ fontFamily: FONTS, fontSize: 22, fontWeight: 700, color: "#22c55e" }}>{avgUptime7d.toFixed(1)}%</div></div>
        </div>

        <div style={{ marginBottom: 20 }}>
          <div style={{ fontFamily: FONTS, fontSize: 13, fontWeight: 700, color: "#94a3b8", marginBottom: 12, letterSpacing: "0.06em" }}>7-DAY OEE & UPTIME TREND</div>
          <ResponsiveContainer width="100%" height={200}>
            <AreaChart data={m.history7d}><CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" /><XAxis dataKey="day" tick={{ fill: "#64748b", fontSize: 11 }} /><YAxis tick={{ fill: "#64748b", fontSize: 11 }} /><Tooltip contentStyle={{ background: "#1e293b", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, fontFamily: FONTS, fontSize: 12 }} /><Area type="monotone" dataKey="oee" stroke="#38bdf8" fill="rgba(56,189,248,0.15)" strokeWidth={2} /><Area type="monotone" dataKey="uptime" stroke="#22c55e" fill="rgba(34,197,94,0.1)" strokeWidth={2} /><Legend /></AreaChart>
          </ResponsiveContainer>
        </div>

        <div style={{ marginBottom: 20 }}>
          <div style={{ fontFamily: FONTS, fontSize: 13, fontWeight: 700, color: "#94a3b8", marginBottom: 12, letterSpacing: "0.06em" }}>DAILY PRODUCTION & REJECTS</div>
          <ResponsiveContainer width="100%" height={180}>
            <BarChart data={m.history7d}><CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" /><XAxis dataKey="day" tick={{ fill: "#64748b", fontSize: 11 }} /><YAxis tick={{ fill: "#64748b", fontSize: 11 }} /><Tooltip contentStyle={{ background: "#1e293b", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, fontFamily: FONTS, fontSize: 12 }} /><Bar dataKey="production" fill="#38bdf8" radius={[4,4,0,0]} /><Bar dataKey="rejects" fill="#ef4444" radius={[4,4,0,0]} /><Legend /></BarChart>
          </ResponsiveContainer>
        </div>

        <div style={{ marginBottom: 20 }}>
          <div style={{ fontFamily: FONTS, fontSize: 13, fontWeight: 700, color: "#94a3b8", marginBottom: 12, letterSpacing: "0.06em" }}>MAINTENANCE INFO</div>
          <div style={{ ...S.card, padding: 14, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <div><span style={{ fontSize: 11, color: "#64748b" }}>Last Maintenance</span><div style={{ fontFamily: FONTS, fontWeight: 700 }}>{m.lastMaintenance} days ago</div></div>
            <div><span style={{ fontSize: 11, color: "#64748b" }}>Next Scheduled</span><div style={{ fontFamily: FONTS, fontWeight: 700, color: m.nextMaintenance < 3 ? "#ef4444" : "#22c55e" }}>In {m.nextMaintenance} days</div></div>
          </div>
        </div>

        {m.alerts.length > 0 && (
          <div>
            <div style={{ fontFamily: FONTS, fontSize: 13, fontWeight: 700, color: "#94a3b8", marginBottom: 12, letterSpacing: "0.06em" }}>ACTIVE ALERTS</div>
            {m.alerts.map((a, i) => (
              <div key={i} style={{ ...S.card, padding: 10, marginBottom: 6, borderLeft: `3px solid ${a.type === "critical" ? "#ef4444" : a.type === "warning" ? "#f59e0b" : "#38bdf8"}`, display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontFamily: FONTS, fontSize: 12 }}>{a.msg}</span>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
};

// --- DETAIL VIEW ---
const MachineDetail = ({ machine, onBack }) => {
  const [showReport, setShowReport] = useState(false);
  const [histView, setHistView] = useState("24h");
  const m = machine;
  return (
    <div style={{ padding: 24, ...S.scrollY, height: "calc(100vh - 64px)" }}>
      {showReport && <ReportModal machine={m} onClose={() => setShowReport(false)} />}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 24 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <button style={{ ...S.btn(), padding: "6px 14px" }} onClick={onBack}>&larr; Back</button>
          <IconMachine type={m.type} size={52} status={m.status} />
          <div>
            <div style={{ fontFamily: FONTS, fontSize: 22, fontWeight: 700 }}>{m.id}</div>
            <div style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 4 }}>
              <span style={S.badge(m.status)}><StatusDot status={m.status} />{m.status}</span>
              <span style={{ fontSize: 12, color: "#64748b" }}>{m.type} Machine</span>
            </div>
          </div>
        </div>
        <button style={S.btn("primary")} onClick={() => setShowReport(true)}>Generate Report</button>
      </div>

      {/* Live Gauges */}
      <div style={{ display: "flex", gap: 20, flexWrap: "wrap", marginBottom: 28 }}>
        <MiniGauge value={m.oee} label="OEE" unit="%" color="#38bdf8" />
        <MiniGauge value={m.cycleTime} max={30} label="Cycle Time" unit="sec" color="#a78bfa" />
        <MiniGauge value={m.rejectRate} max={10} label="Reject Rate" unit="%" color="#f87171" />
        {m.type !== "Press" && <MiniGauge value={m.spindleSpeed} max={3000} label="Spindle" unit="RPM" color="#fbbf24" />}
        <MiniGauge value={m.temp} max={100} label="Temp" unit="\u00B0C" color={m.temp > 70 ? "#ef4444" : "#22c55e"} />
        <MiniGauge value={m.vibration} max={15} label="Vibration" unit="mm/s" color={m.vibration > 9 ? "#ef4444" : "#22c55e"} />
        <MiniGauge value={m.power} label="Power" unit="%" color="#38bdf8" />
      </div>

      {/* Quick stats row */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(150px, 1fr))", gap: 12, marginBottom: 28 }}>
        <div style={{ ...S.card, padding: 14 }}><div style={{ fontSize: 10, color: "#64748b", fontFamily: FONTS }}>RUNTIME</div><div style={{ fontFamily: FONTS, fontSize: 20, fontWeight: 700, color: "#22c55e" }}>{m.runtime.toFixed(1)}h</div></div>
        <div style={{ ...S.card, padding: 14 }}><div style={{ fontSize: 10, color: "#64748b", fontFamily: FONTS }}>IDLE TIME</div><div style={{ fontFamily: FONTS, fontSize: 20, fontWeight: 700, color: "#f59e0b" }}>{m.idleTime.toFixed(1)}h</div></div>
        <div style={{ ...S.card, padding: 14 }}><div style={{ fontSize: 10, color: "#64748b", fontFamily: FONTS }}>PRODUCTION</div><div style={{ fontFamily: FONTS, fontSize: 20, fontWeight: 700 }}>{m.productionCount}</div></div>
        <div style={{ ...S.card, padding: 14 }}><div style={{ fontSize: 10, color: "#64748b", fontFamily: FONTS }}>LAST MAINT.</div><div style={{ fontFamily: FONTS, fontSize: 20, fontWeight: 700 }}>{m.lastMaintenance}d ago</div></div>
        <div style={{ ...S.card, padding: 14 }}><div style={{ fontSize: 10, color: "#64748b", fontFamily: FONTS }}>NEXT MAINT.</div><div style={{ fontFamily: FONTS, fontSize: 20, fontWeight: 700, color: m.nextMaintenance < 3 ? "#ef4444" : "#22c55e" }}>In {m.nextMaintenance}d</div></div>
      </div>

      {/* History toggle */}
      <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
        {["24h", "7d"].map(v => <button key={v} style={S.pill(histView === v)} onClick={() => setHistView(v)}>{v === "24h" ? "Last 24 Hours" : "Last 7 Days"}</button>)}
      </div>

      {histView === "24h" ? (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
          <div style={S.card}>
            <div style={{ fontFamily: FONTS, fontSize: 12, color: "#64748b", marginBottom: 10, letterSpacing: "0.06em" }}>OEE TREND (24H)</div>
            <ResponsiveContainer width="100%" height={180}>
              <LineChart data={m.history24h}><CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" /><XAxis dataKey="hour" tick={{ fill: "#64748b", fontSize: 9 }} interval={3} /><YAxis tick={{ fill: "#64748b", fontSize: 10 }} domain={[0, 100]} /><Tooltip contentStyle={{ background: "#1e293b", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, fontFamily: FONTS, fontSize: 11 }} /><Line type="monotone" dataKey="oee" stroke="#38bdf8" strokeWidth={2} dot={false} /></LineChart>
            </ResponsiveContainer>
          </div>
          <div style={S.card}>
            <div style={{ fontFamily: FONTS, fontSize: 12, color: "#64748b", marginBottom: 10, letterSpacing: "0.06em" }}>TEMPERATURE (24H)</div>
            <ResponsiveContainer width="100%" height={180}>
              <AreaChart data={m.history24h}><CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" /><XAxis dataKey="hour" tick={{ fill: "#64748b", fontSize: 9 }} interval={3} /><YAxis tick={{ fill: "#64748b", fontSize: 10 }} /><Tooltip contentStyle={{ background: "#1e293b", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, fontFamily: FONTS, fontSize: 11 }} /><Area type="monotone" dataKey="temp" stroke="#f97316" fill="rgba(249,115,22,0.1)" strokeWidth={2} /></AreaChart>
            </ResponsiveContainer>
          </div>
          <div style={S.card}>
            <div style={{ fontFamily: FONTS, fontSize: 12, color: "#64748b", marginBottom: 10, letterSpacing: "0.06em" }}>POWER CONSUMPTION (24H)</div>
            <ResponsiveContainer width="100%" height={180}>
              <AreaChart data={m.history24h}><CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" /><XAxis dataKey="hour" tick={{ fill: "#64748b", fontSize: 9 }} interval={3} /><YAxis tick={{ fill: "#64748b", fontSize: 10 }} /><Tooltip contentStyle={{ background: "#1e293b", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, fontFamily: FONTS, fontSize: 11 }} /><Area type="monotone" dataKey="power" stroke="#38bdf8" fill="rgba(56,189,248,0.1)" strokeWidth={2} /></AreaChart>
            </ResponsiveContainer>
          </div>
          <div style={S.card}>
            <div style={{ fontFamily: FONTS, fontSize: 12, color: "#64748b", marginBottom: 10, letterSpacing: "0.06em" }}>PRODUCTION / HOUR</div>
            <ResponsiveContainer width="100%" height={180}>
              <BarChart data={m.history24h}><CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" /><XAxis dataKey="hour" tick={{ fill: "#64748b", fontSize: 9 }} interval={3} /><YAxis tick={{ fill: "#64748b", fontSize: 10 }} /><Tooltip contentStyle={{ background: "#1e293b", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, fontFamily: FONTS, fontSize: 11 }} /><Bar dataKey="production" fill="#22c55e" radius={[3,3,0,0]} /></BarChart>
            </ResponsiveContainer>
          </div>
        </div>
      ) : (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
          <div style={S.card}>
            <div style={{ fontFamily: FONTS, fontSize: 12, color: "#64748b", marginBottom: 10, letterSpacing: "0.06em" }}>7-DAY OEE</div>
            <ResponsiveContainer width="100%" height={180}>
              <LineChart data={m.history7d}><CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" /><XAxis dataKey="day" tick={{ fill: "#64748b", fontSize: 11 }} /><YAxis tick={{ fill: "#64748b", fontSize: 10 }} domain={[0, 100]} /><Tooltip contentStyle={{ background: "#1e293b", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, fontFamily: FONTS, fontSize: 11 }} /><Line type="monotone" dataKey="oee" stroke="#38bdf8" strokeWidth={2.5} /><Line type="monotone" dataKey="uptime" stroke="#22c55e" strokeWidth={2} strokeDasharray="5 5" /><Legend /></LineChart>
            </ResponsiveContainer>
          </div>
          <div style={S.card}>
            <div style={{ fontFamily: FONTS, fontSize: 12, color: "#64748b", marginBottom: 10, letterSpacing: "0.06em" }}>PRODUCTION & REJECTS</div>
            <ResponsiveContainer width="100%" height={180}>
              <BarChart data={m.history7d}><CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" /><XAxis dataKey="day" tick={{ fill: "#64748b", fontSize: 11 }} /><YAxis tick={{ fill: "#64748b", fontSize: 10 }} /><Tooltip contentStyle={{ background: "#1e293b", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, fontFamily: FONTS, fontSize: 11 }} /><Bar dataKey="production" fill="#38bdf8" radius={[4,4,0,0]} /><Bar dataKey="rejects" fill="#ef4444" radius={[4,4,0,0]} /><Legend /></BarChart>
            </ResponsiveContainer>
          </div>
        </div>
      )}

      {/* Alerts */}
      {m.alerts.length > 0 && (
        <div style={{ marginTop: 24 }}>
          <div style={{ fontFamily: FONTS, fontSize: 13, fontWeight: 700, color: "#94a3b8", marginBottom: 10, letterSpacing: "0.06em" }}>ACTIVE ALERTS</div>
          {m.alerts.map((a, i) => (
            <div key={i} style={{ ...S.card, padding: "10px 14px", marginBottom: 8, borderLeft: `3px solid ${a.type === "critical" ? "#ef4444" : a.type === "warning" ? "#f59e0b" : "#38bdf8"}`, display: "flex", gap: 10, alignItems: "center" }}>
              <span style={{ fontFamily: FONTS, fontSize: 12 }}>{a.msg}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

// --- MAIN APP ---
function App() {
  const [filter, setFilter] = useState("All");
  const [selectedMachine, setSelectedMachine] = useState(null);
  const [search, setSearch] = useState("");

  const filtered = useMemo(() => {
    let list = filter === "All" ? ALL_MACHINES : ALL_MACHINES.filter(m => m.type === filter);
    if (search) list = list.filter(m => m.id.toLowerCase().includes(search.toLowerCase()));
    return list;
  }, [filter, search]);

  const summary = useMemo(() => {
    const f = filtered;
    return {
      total: f.length,
      running: f.filter(m => m.status === "Running").length,
      idle: f.filter(m => m.status === "Idle").length,
      offline: f.filter(m => m.status === "Offline").length,
      maintenance: f.filter(m => m.status === "Maintenance").length,
      avgOEE: f.length ? f.reduce((a, m) => a + m.oee, 0) / f.length : 0,
      avgCycle: f.length ? f.reduce((a, m) => a + m.cycleTime, 0) / f.length : 0,
      totalAlerts: f.reduce((a, m) => a + m.alerts.length, 0),
      totalProduction: f.reduce((a, m) => a + m.productionCount, 0),
    };
  }, [filtered]);

  const statusPieData = [
    { name: "Running", value: summary.running, color: STATUS_COLORS.Running },
    { name: "Idle", value: summary.idle, color: STATUS_COLORS.Idle },
    { name: "Offline", value: summary.offline, color: STATUS_COLORS.Offline },
    { name: "Maintenance", value: summary.maintenance, color: STATUS_COLORS.Maintenance },
  ].filter(d => d.value > 0);

  if (selectedMachine) {
    return (
      <div style={S.root}>
        <header style={S.header}>
          <div style={S.logo}>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="3" stroke="#38bdf8" strokeWidth="2"/><circle cx="8" cy="12" r="2" fill="#38bdf8"/><circle cx="16" cy="12" r="2" fill="#38bdf8"/><line x1="8" y1="12" x2="16" y2="12" stroke="#38bdf8" strokeWidth="1.5"/></svg>
            CRAFTSMAN<span style="color:#38bdf8"> ENGG.</span>
          </div>
          <div style={{ fontFamily: FONTS, fontSize: 12, color: "#64748b" }}>Craftsman Engg. — IoT Monitoring</div>
        </header>
        <MachineDetail machine={selectedMachine} onBack={() => setSelectedMachine(null)} />
      </div>
    );
  }

  return (
    <div style={S.root}>
      {/* Header */}
      <header style={S.header}>
        <div style={S.logo}>
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="3" stroke="#38bdf8" strokeWidth="2"/><circle cx="8" cy="12" r="2" fill="#38bdf8"/><circle cx="16" cy="12" r="2" fill="#38bdf8"/><line x1="8" y1="12" x2="16" y2="12" stroke="#38bdf8" strokeWidth="1.5"/></svg>
          CRAFTSMAN<span style="color:#38bdf8"> ENGG.</span>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
          <input
            value={search}
            onChange={e => setSearch(e.target.value)}
            placeholder="Search machine ID..."
            style={{ padding: "7px 14px", borderRadius: 20, border: "1px solid rgba(255,255,255,0.08)", background: "rgba(255,255,255,0.03)", color: "#e2e8f0", fontFamily: FONTS, fontSize: 12, outline: "none", width: 180 }}
          />
          {["All", ...MACHINE_TYPES].map(t => (
            <button key={t} style={S.pill(filter === t)} onClick={() => setFilter(t)}>
              {t} {t !== "All" && <span style={{ opacity: 0.6 }}>({ALL_MACHINES.filter(m => t === "All" || m.type === t).length})</span>}
            </button>
          ))}
        </div>
      </header>

      <div style={{ padding: 24, ...S.scrollY, height: "calc(100vh - 64px)" }}>
        {/* KPI Row */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(6, 1fr)", gap: 14, marginBottom: 24 }}>
          <KPICard label="Total Machines" value={summary.total} color="#e2e8f0" />
          <KPICard label="Running" value={summary.running} color="#22c55e" trend={2.3} />
          <KPICard label="Idle" value={summary.idle} color="#f59e0b" trend={-1.5} />
          <KPICard label="Avg OEE" value={summary.avgOEE} suffix="%" color="#38bdf8" trend={1.8} />
          <KPICard label="Production Today" value={summary.totalProduction} color="#e2e8f0" />
          <KPICard label="Active Alerts" value={summary.totalAlerts} color={summary.totalAlerts > 5 ? "#ef4444" : "#f59e0b"} />
        </div>

        {/* Status distribution + summary row */}
        <div style={{ display: "grid", gridTemplateColumns: "280px 1fr", gap: 16, marginBottom: 24 }}>
          <div style={{ ...S.card, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
            <div style={{ fontFamily: FONTS, fontSize: 12, color: "#64748b", marginBottom: 8, letterSpacing: "0.06em" }}>STATUS DISTRIBUTION</div>
            <ResponsiveContainer width={200} height={160}>
              <PieChart><Pie data={statusPieData} cx="50%" cy="50%" innerRadius={40} outerRadius={65} paddingAngle={3} dataKey="value">{statusPieData.map((d, i) => <Cell key={i} fill={d.color} />)}</Pie><Tooltip contentStyle={{ background: "#1e293b", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, fontFamily: FONTS, fontSize: 11 }} /></PieChart>
            </ResponsiveContainer>
            <div style={{ display: "flex", gap: 12, flexWrap: "wrap", justifyContent: "center" }}>
              {statusPieData.map(d => (
                <div key={d.name} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 11, color: "#94a3b8" }}>
                  <span style={{ width: 8, height: 8, borderRadius: "50%", background: d.color, display: "inline-block" }} />{d.name}: {d.value}
                </div>
              ))}
            </div>
          </div>
          <div style={S.card}>
            <div style={{ fontFamily: FONTS, fontSize: 12, color: "#64748b", marginBottom: 8, letterSpacing: "0.06em" }}>OEE BY MACHINE (FILTERED)</div>
            <ResponsiveContainer width="100%" height={180}>
              <BarChart data={filtered.slice(0, 20).map(m => ({ id: m.id.replace(m.type + "-", ""), oee: m.oee, type: m.type }))}>
                <CartesianGrid strokeDasharray="3 3" stroke="rgba(255,255,255,0.04)" />
                <XAxis dataKey="id" tick={{ fill: "#64748b", fontSize: 9 }} interval={0} angle={-45} textAnchor="end" height={40} />
                <YAxis tick={{ fill: "#64748b", fontSize: 10 }} domain={[0, 100]} />
                <Tooltip contentStyle={{ background: "#1e293b", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 8, fontFamily: FONTS, fontSize: 11 }} />
                <Bar dataKey="oee" radius={[4, 4, 0, 0]}>
                  {filtered.slice(0, 20).map((m, i) => <Cell key={i} fill={m.oee > 70 ? "#22c55e" : m.oee > 40 ? "#f59e0b" : "#ef4444"} />)}
                </Bar>
              </BarChart>
            </ResponsiveContainer>
          </div>
        </div>

        {/* Machine Grid */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
          <div style={{ fontFamily: FONTS, fontSize: 14, fontWeight: 700, color: "#94a3b8", letterSpacing: "0.06em" }}>
            MACHINE STATUS — {filtered.length} machines
          </div>
          <div style={{ fontSize: 11, color: "#475569" }}>Click any machine to view details & generate report</div>
        </div>
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px, 1fr))", gap: 14 }}>
          {filtered.map(m => (
            <MachineGridCard key={m.id} machine={m} onClick={() => setSelectedMachine(m)} />
          ))}
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
    </script>
</body>
</html>
